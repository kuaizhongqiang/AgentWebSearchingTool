name: Release & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.3). If omitted, semantic-release determines it."
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      released: ${{ steps.resolve.outputs.released }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Manual version: skip semantic-release when version is provided via workflow_dispatch
      - name: Manual version
        id: manual
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        run: |
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"

      # Semantic release: for push events or manual trigger without version
      - uses: actions/setup-node@v4
        if: steps.manual.outputs.released != 'true'
        with:
          node-version: 20
      - name: Semantic Release
        id: semantic
        if: steps.manual.outputs.released != 'true'
        run: |
          npm install -g semantic-release \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/changelog \
            @semantic-release/github \
            @semantic-release/git
          output=$(npx semantic-release 2>&1) || true
          echo "$output"
          version=$(echo "$output" | grep -oP 'Published release \K\d+\.\d+\.\d+' | tail -1)
          if [ -n "$version" ]; then
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "New release detected: v$version"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No new release"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Resolve: pick manual version if provided, otherwise semantic-release output
      - name: Resolve final version
        id: resolve
        run: |
          if [ "${{ steps.manual.outputs.released }}" = "true" ]; then
            echo "version=${{ steps.manual.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ steps.semantic.outputs.version }}" >> "$GITHUB_OUTPUT"
            echo "released=${{ steps.semantic.outputs.released }}" >> "$GITHUB_OUTPUT"
          fi

  pypi-publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set version
        run: |
          python <<EOF
          import re
          with open('pyproject.toml') as f:
              content = f.read()
          content = re.sub(
              r'^version = ".*"',
              'version = "${{ needs.release.outputs.version }}"',
              content, flags=re.MULTILINE
          )
          with open('pyproject.toml', 'w') as f:
              f.write(content)
          EOF
          grep '^version' pyproject.toml
      - name: Bundle searxng-core into package
        run: python scripts/prepare_build.py
      - name: Build
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: engine/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}

  npm-publish-mcp:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Set version
        run: npm version ${{ needs.release.outputs.version }} --no-git-tag-version --allow-same-version 2>/dev/null || true
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  npm-publish-cli:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Set version
        run: npm version ${{ needs.release.outputs.version }} --no-git-tag-version --allow-same-version 2>/dev/null || true
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
